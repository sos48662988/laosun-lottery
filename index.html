<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸老孫抽奖站🌸</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
* {
  box-sizing: border-box;
  font-family: "圆幼体", "微软雅黑", sans-serif;
}
html, body {
  margin: 0;
  padding: 0;
  background: #121122;
  color: #f5f5f5;
  height: 100%;
}
.container {
  width: 100%;
  height: 100vh;
  padding: 12px;
  display: flex;
  flex-direction: column;
}
.title-bar {
  text-align: center;
  padding: 6px 0;
}
h1 {
  font-size: 28px;
  color: #fb7299;
  margin: 0;
}

.main-content {
  display: flex;
  gap: 12px;
  flex: 1;
  min-height: 0;
}
.left-card {
  flex: 0 0 420px;
  background: #1e1e1e;
  border-radius: 16px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.right-card {
  flex: 1;
  background: #1e1e1e;
  border-radius: 16px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

@media (max-width: 768px) {
  .main-content {
    flex-direction: column;
  }
  .left-card {
    flex: none;
  }
  .right-card {
    flex: 1;
    min-height: 0;
  }
  .result {
    grid-template-columns: 1fr !important;
  }
}

h3 {
  font-size: 18px;
  margin: 0 0 10px;
  text-align: center;
  color: #fb7299;
}
.label {
  font-size: 16px;
  margin: 8px 0 4px;
}
.tip {
  font-size: 12px;
  color: #999;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #333;
  border-radius: 12px;
  font-size: 14px;
  background: #2a2a2a;
  color: #f5f5f5;
}
input:focus, select:focus, textarea:focus {
  border-color: #fb7299;
  outline: none;
}
textarea {
  height: 80px;
  resize: none;
}

.btn {
  background: #fb7299;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 12px;
  font-size: 16px;
}
.btn:hover {
  background: #ff85a8;
}
.btn:disabled {
  background: #333;
  color: #666;
}
.btn-clear {
  background: #444 !important;
}

.radio-group {
  display: flex;
  gap: 10px;
}
.radio-item {
  flex: 1;
  text-align: center;
  padding: 10px;
  border: 1px solid #333;
  border-radius: 12px;
  background: #2a2a2a;
  font-size: 14px;
}
.radio-item.active {
  background: #fb7299;
  border-color: #fb7299;
}
.radio-item input {
  display: none;
}

/* 核心布局：固定间距，仅滚动，不撑开 */
.result {
  background: #2a2a2a;
  padding: 8px;
  border-radius: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  align-content: start;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
}
.result::-webkit-scrollbar {
  width: 8px;
}
.result::-webkit-scrollbar-thumb {
  background: #fb7299;
  border-radius: 4px;
}

/* 卡片样式：确保头像占位 */
.winner-card {
  background: #333;
  border-radius: 12px;
  padding: 12px;
  display: flex;
  gap: 10px;
  height: 100px;
  width: 100%;
  align-items: center; /* 垂直居中，更美观 */
}
/* 头像容器：固定50px宽高，确保即使没图也不会移位 */
.avatar-container {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  background: #444; /* 兜底背景色 */
  display: flex;
  align-items: center;
  justify-content: center;
}
.winner-avatar {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.winner-card h4 {
  margin: 0 0 4px;
  color: #fb7299;
  font-size: 16px;
}
.winner-info-wrap {
  flex: 1;
}
.winner-info {
  font-size: 13px;
  color: #ddd;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}

.empty-state {
  text-align: center;
  padding: 20px;
  color: #888;
  grid-column: span 2;
}
.stats {
  text-align: center;
  color: #fb7299;
  margin-top: 8px;
}
.time-filter {
  display: flex;
  gap: 8px;
}
</style>
</head>
<body>

<div class="container">
  <div class="title-bar">
    <h1>🌸老孫抽奖站🌸</h1>
  </div>

  <div class="main-content">
    <div class="left-card">
      <div>
        <div class="label">导入表格</div>
        <div class="tip">支持 xlsx、xls、csv</div>
        <input type="file" id="file" accept=".xlsx,.xls,.csv">
      </div>
      <div>
        <div class="label">中奖人数</div>
        <select id="count">
          <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
          <option>11</option><option>12</option><option>13</option><option>14</option><option>15</option>
          <option>16</option><option>17</option><option>18</option><option>19</option><option>20</option>
        </select>
      </div>
      <div>
        <div class="label">允许@他人</div>
        <div class="radio-group">
          <label class="radio-item active"><input type="radio" name="at" value="allow" checked>允许</label>
          <label class="radio-item"><input type="radio" name="at" value="forbid">禁止</label>
        </div>
      </div>
      <div>
        <div class="label">重复处理</div>
        <div class="radio-group">
          <label class="radio-item active"><input type="radio" name="repeat" value="dedupe" checked>同一人去重</label>
          <label class="radio-item"><input type="radio" name="repeat" value="keep">完全不去重</label>
        </div>
      </div>
      <div>
        <div class="label">时间筛选</div>
        <div class="time-filter">
          <input type="datetime-local" id="startTime">
          <input type="datetime-local" id="endTime">
        </div>
      </div>
      <div>
        <div class="label">屏蔽词（一行一个）</div>
        <textarea id="block" placeholder="一行一个屏蔽词"></textarea>
      </div>
      <button class="btn" id="start" disabled>开始抽奖</button>
      <button class="btn" id="export">导出中奖名单</button>
      <button class="btn btn-clear" id="clearRecord">清空已中奖记录</button>
      <div class="stats" id="info"></div>
    </div>

    <div class="right-card">
      <h3>🎊 中奖名单 🎊</h3>
      <div class="result" id="result">
        <div class="empty-state">点击「开始抽奖」生成名单</div>
      </div>
    </div>
  </div>
</div>

<script>
let rows = [];
let winList = [];
let head = [];
let wonUIDs = JSON.parse(localStorage.getItem('wonUIDs') || '[]');
// 可靠的图片代理前缀，解决跨域问题
const PROXY_PREFIX = 'https://images.weserv.nl/?url=';
// 默认头像
const DEFAULT_AVATAR = 'https://picsum.photos/50/50';

function calcValidCount() {
  if (rows.length === 0) return 0;
  const at = document.querySelector('input[name="at"]:checked').value;
  const dedupe = document.querySelector('input[name="repeat"]:checked').value;
  const blocks = document.getElementById('block').value.split('\n').map(i => i.trim().toLowerCase()).filter(Boolean);
  const st = document.getElementById('startTime').value ? new Date(document.getElementById('startTime').value) : null;
  const et = document.getElementById('endTime').value ? new Date(document.getElementById('endTime').value) : null;

  let pool = rows.filter(r => {
    const t = r.join('').toLowerCase();
    if (at === 'forbid' && t.includes('@')) return false;
    if (blocks.some(b => t.includes(b))) return false;
    const ct = r[8] ? new Date(r[8]) : null;
    if (ct && st && ct < st) return false;
    if (ct && et && ct > et) return false;
    const uid = r[2]?.toString().trim();
    if (uid && wonUIDs.includes(uid)) return false;
    return true;
  });
  if (dedupe === 'dedupe') {
    const u = new Set();
    pool = pool.filter(row => {
      const uid = row[2];
      if (u.has(uid)) return false;
      u.add(uid);
      return true;
    });
  }
  return pool.length;
}

function updateStats() {
  const total = rows.length;
  const valid = calcValidCount();
  const won = wonUIDs.length;
  document.getElementById('info').innerText = `总评论：${total}｜有效：${valid}｜累计已抽：${won}`;
}

// 绑定事件
document.querySelectorAll('input[name="at"], input[name="repeat"]').forEach(el => el.addEventListener('change', updateStats));
document.getElementById('block').addEventListener('input', updateStats);
document.getElementById('startTime').addEventListener('change', updateStats);
document.getElementById('endTime').addEventListener('change', updateStats);

document.querySelectorAll('.radio-item').forEach(item => {
  item.addEventListener('click', () => {
    const name = item.querySelector('input').name;
    document.querySelectorAll(`input[name="${name}"]`).forEach(i => i.parentElement.classList.remove('active'));
    item.classList.add('active');
    item.querySelector('input').checked = true;
    updateStats();
  });
});

// 导入表格
document.getElementById('file').onchange = e => {
  const f = new FileReader();
  f.onload = e => {
    const wb = XLSX.read(e.target.result);
    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
    head = data[0] || [];
    rows = data.slice(1).filter(i => i && i.join('').trim());
    document.getElementById('start').disabled = false;
    updateStats();
    alert(`导入成功：共 ${rows.length} 条数据`);
  };
  f.readAsArrayBuffer(e.target.files[0]);
};

// 核心抽奖逻辑
document.getElementById('start').onclick = () => {
  const num = +document.getElementById('count').value;
  const valid = calcValidCount();
  if (valid < num) {
    alert(`有效人数不足！当前有效：${valid}，需抽取：${num}`);
    return;
  }

  // 筛选逻辑
  const at = document.querySelector('input[name="at"]:checked').value;
  const dedupe = document.querySelector('input[name="repeat"]:checked').value;
  const blocks = document.getElementById('block').value.split('\n').map(i => i.trim().toLowerCase()).filter(Boolean);
  const st = document.getElementById('startTime').value ? new Date(document.getElementById('startTime').value) : null;
  const et = document.getElementById('endTime').value ? new Date(document.getElementById('endTime').value) : null;

  let pool = rows.filter(r => {
    const t = r.join('').toLowerCase();
    if (at === 'forbid' && t.includes('@')) return false;
    if (blocks.some(b => t.includes(b))) return false;
    const ct = r[8] ? new Date(r[8]) : null;
    if (ct && st && ct < st) return false;
    if (ct && et && ct > et) return false;
    const uid = r[2]?.toString().trim();
    if (uid && wonUIDs.includes(uid)) return false;
    return true;
  });

  if (dedupe === 'dedupe') {
    const u = new Set();
    pool = pool.filter(row => {
      const uid = row[2];
      if (u.has(uid)) return false;
      u.add(uid);
      return true;
    });
  }

  // 随机抽奖
  pool.sort(() => Math.random() - 0.5);
  winList = pool.slice(0, num);
  
  // 记录已中奖UID
  const newWins = winList.map(w => w[2]?.toString().trim()).filter(Boolean);
  wonUIDs = [...new Set([...wonUIDs, ...newWins])];
  localStorage.setItem('wonUIDs', JSON.stringify(wonUIDs));

  // 渲染中奖名单
  const res = document.getElementById('result');
  res.innerHTML = '';

  winList.forEach((w, i) => {
    const uid = w[2] || '未知';
    const name = w[4] || '匿名用户';
    const comment = w[7] || '无评论';
    // 获取表格中的头像链接（第15列，索引14）
    const rawAvatar = w[14] || '';

    // 1. 创建卡片容器
    const card = document.createElement('div');
    card.className = 'winner-card';

    // 2. 创建头像容器（固定占位）
    const avatarContainer = document.createElement('div');
    avatarContainer.className = 'avatar-container';

    // 3. 创建图片元素
    const img = document.createElement('img');
    img.className = 'winner-avatar';
    
    // 设置图片地址：有链接则用代理，无则用默认图
    if (rawAvatar && rawAvatar.trim() !== '') {
      // 使用代理解决跨域问题
      img.src = PROXY_PREFIX + encodeURIComponent(rawAvatar.trim());
    } else {
      // 无头像时显示默认图
      img.src = DEFAULT_AVATAR;
    }

    // 图片加载失败时，强制显示默认图（不再隐藏）
    img.onerror = function() {
      this.src = DEFAULT_AVATAR;
    };

    // 4. 创建信息区域
    const infoWrap = document.createElement('div');
    infoWrap.className = 'winner-info-wrap';
    infoWrap.innerHTML = `
      <h4>🎊 第${i+1}名</h4>
      <div class="winner-info">UID：${uid}</div>
      <div class="winner-info">暱稱：${name}</div>
      <div class="winner-info">${comment}</div>
    `;

    // 5. 组装卡片
    avatarContainer.appendChild(img);
    card.appendChild(avatarContainer);
    card.appendChild(infoWrap);
    res.appendChild(card);
  });

  updateStats();
};

// 导出名单
document.getElementById('export').onclick = () => {
  if (!winList.length) {
    alert('请先进行抽奖！');
    return;
  }
  const ws = XLSX.utils.aoa_to_sheet([head, ...winList]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '中奖名单');
  XLSX.writeFile(wb, '老孫抽奖站_中奖名单.xlsx');
};

// 清空记录
document.getElementById('clearRecord').onclick = () => {
  if (confirm('确定要清空所有已中奖记录吗？此操作不可恢复！')) {
    wonUIDs = [];
    localStorage.removeItem('wonUIDs');
    updateStats();
    alert('已清空所有中奖记录');
  }
};
</script>
</body>
</html>
