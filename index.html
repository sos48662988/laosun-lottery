<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸老孫抽奖站🌸</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
* {
  box-sizing: border-box;
  font-family: "圆幼体", "微软雅黑", sans-serif;
}
html, body {
  margin: 0;
  padding: 0;
  background: #121121;
  color: #f5f5f5;
  height: 100%;
}
.container {
  width: 100%;
  min-height: 100vh;
  padding: 12px;
  display: flex;
  flex-direction: column;
}
.title-bar {
  text-align: center;
  padding: 6px 0;
  flex-shrink: 0;
}
h1 {
  font-size: 28px;
  color: #fb7299;
  margin: 0;
  font-weight: 500;
}

.main-content {
  display: flex;
  gap: 12px;
  flex: 1;
  min-height: 0;
}
.left-card {
  flex: 0 0 420px;
  background: #1e1e1e;
  border-radius: 16px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.right-card {
  flex: 1;
  background: #1e1e1e;
  border-radius: 16px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

@media (max-width: 768px) {
  .main-content {
    flex-direction: column;
  }
  .left-card {
    flex: none;
  }
  .right-card {
    flex: none;
    min-height: 500px;
  }
  .result {
    grid-template-columns: 1fr !important;
  }
}

h3 {
  font-size: 18px;
  margin: 0 0 10px;
  text-align: center;
  color: #fb7299;
  flex-shrink: 0;
}
.label {
  font-size: 16px;
  margin: 8px 0 4px;
  color: #e0e0e0;
}
.tip {
  font-size: 12px;
  color: #999;
  margin: 2px 0;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #333;
  border-radius: 12px;
  font-size: 14px;
  background: #2a2a2a;
  color: #f5f5f5;
}
input:focus, select:focus, textarea:focus {
  border-color: #fb7299;
  outline: none;
}
textarea {
  height: 80px;
  resize: none;
}

.btn {
  width: 100%;
  background: #fb7299;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 12px;
  font-size: 16px;
  flex-shrink: 0;
}
.btn:hover {
  background: #ff85a8;
}
.btn:disabled {
  background: #333;
  color: #666;
}
.btn-clear {
  background: #444 !important;
}

.radio-group {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.radio-item {
  flex: 1;
  text-align: center;
  padding: 10px;
  border: 1px solid #333;
  border-radius: 12px;
  background: #2a2a2a;
  color: #f5f5f5;
  font-size: 14px;
}
.radio-item.active {
  background: #fb7299;
  border-color: #fb7299;
  color: #fff;
}
.radio-item input {
  display: none;
}

.result {
  background: #2a2a2a;
  padding: 10px;
  border-radius: 12px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #fb7299 #333;
}
.result::-webkit-scrollbar {
  width: 8px;
}
.result::-webkit-scrollbar-track {
  background: #333;
  border-radius: 4px;
}
.result::-webkit-scrollbar-thumb {
  background: #fb7299;
  border-radius: 4px;
}

.winner-card {
  background: #333;
  border-radius: 12px;
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 120px;
  width: 100%;
}
.winner-avatar {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.winner-card h4 {
  margin: 0 0 4px;
  color: #fb7299;
  font-size: 16px;
}
.winner-info-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.winner-info {
  font-size: 13px;
  line-height: 1.4;
  color: #ddd;
  margin: 2px 0;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 20px;
  color: #888;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}
.stats {
  font-size: 13px;
  color: #999;
  margin-top: 8px;
  text-align: center;
  flex-shrink: 0;
}
.time-filter {
  display: flex;
  gap: 8px;
}
.time-filter input {
  flex: 1;
  padding: 10px;
}

input[type="file"]::file-selector-button {
  background: #fb7299;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  margin-right: 8px;
  cursor: pointer;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
  <div class="title-bar">
    <h1>🌸老孫抽奖站🌸</h1>
  </div>

  <div class="main-content">
    <div class="left-card">
      <div>
        <div class="label">1. 导入表格</div>
        <div class="tip">支持 xlsx、xls、csv、xlsm 等格式</div>
        <input type="file" id="file" accept=".xlsx,.xls,.csv,.xlsm">
      </div>

      <div>
        <div class="label">2. 中奖人数</div>
        <select id="count">
          <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
          <option>11</option><option>12</option><option>13</option><option>14</option><option>15</option>
          <option>16</option><option>17</option><option>18</option><option>19</option><option>20</option>
        </select>
      </div>

      <div>
        <div class="label">3. 是否允许 @他人</div>
        <div class="radio-group">
          <label class="radio-item active">
            <input type="radio" name="at" value="allow" checked> 允许
          </label>
          <label class="radio-item">
            <input type="radio" name="at" value="forbid"> 禁止
          </label>
        </div>
      </div>

      <div>
        <div class="label">4. 重复处理</div>
        <div class="radio-group">
          <label class="radio-item active">
            <input type="radio" name="repeat" value="dedupe" checked> 同一人去重
          </label>
          <label class="radio-item">
            <input type="radio" name="repeat" value="keep"> 完全不去重
          </label>
        </div>
      </div>

      <div>
        <div class="label">5. 评论时间筛选</div>
        <div class="tip">留空则不限制</div>
        <div class="time-filter">
          <input type="datetime-local" id="startTime">
          <input type="datetime-local" id="endTime">
        </div>
      </div>

      <div>
        <div class="label">6. 屏蔽词（一行一个）</div>
        <textarea id="block" placeholder="一行一个屏蔽词"></textarea>
      </div>

      <button class="btn" id="start" disabled>开始抽奖</button>
      <button class="btn" id="export">导出中奖名单</button>
      <button class="btn btn-clear" id="clearRecord">清空已中奖记录</button>

      <div class="stats" id="info"></div>
    </div>

    <div class="right-card">
      <h3>🎊 中奖名单 🎊</h3>
      <div class="result" id="result">
        <div class="empty-state">点击「开始抽奖」生成中奖名单</div>
      </div>
    </div>
  </div>
</div>

<script>
let rows = [];
let winList = [];
let head = [];
let wonUIDs = JSON.parse(localStorage.getItem('wonUIDs') || '[]');

document.querySelectorAll('.radio-item').forEach(item => {
  item.addEventListener('click', () => {
    const name = item.querySelector('input').name;
    document.querySelectorAll(`input[name="${name}"]`).forEach(i => {
      i.parentElement.classList.remove('active');
    });
    item.classList.add('active');
    item.querySelector('input').checked = true;
  });
});

document.getElementById('file').onchange = e => {
  const f = new FileReader();
  f.onload = e => {
    const wb = XLSX.read(e.target.result);
    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
    if (data.length > 0) {
      head = data[0];
      rows = data.slice(1).filter(i => i.join('').trim());
    }
    document.getElementById('start').disabled = false;
    alert(`导入成功：${rows.length} 条\n已中奖人数：${wonUIDs.length}`);
  };
  f.readAsArrayBuffer(e.target.files[0]);
};

document.getElementById('start').onclick = () => {
  const num = +document.getElementById('count').value;
  const at = document.querySelector('input[name="at"]:checked').value;
  const dedupe = document.querySelector('input[name="repeat"]:checked').value;
  const blocks = document.getElementById('block').value.split('\n').map(i => i.trim().toLowerCase()).filter(Boolean);
  const startTime = document.getElementById('startTime').value ? new Date(document.getElementById('startTime').value) : null;
  const endTime = document.getElementById('endTime').value ? new Date(document.getElementById('endTime').value) : null;

  let pool = rows.filter(r => {
    const t = r.join('').toLowerCase();
    if (at === 'forbid' && t.includes('@')) return false;
    if (blocks.some(b => t.includes(b))) return false;

    const ct = r[8] ? new Date(r[8]) : null;
    if (ct && startTime && ct < startTime) return false;
    if (ct && endTime && ct > endTime) return false;

    const uid = r[2]?.toString().trim();
    if (uid && wonUIDs.includes(uid)) return false;
    return true;
  });

  if (dedupe === 'dedupe') {
    const uidSet = new Set();
    pool = pool.filter(row => {
      const uid = row[2];
      if (uidSet.has(uid)) return false;
      uidSet.add(uid);
      return true;
    });
  }

  if (pool.length < num) {
    alert(`有效人数不足 ${num}（当前有效：${pool.length}）`);
    return;
  }

  pool.sort(() => Math.random() - 0.5);
  winList = pool.slice(0, num);

  const newWins = winList.map(w => w[2]?.toString().trim()).filter(Boolean);
  wonUIDs = [...new Set([...wonUIDs, ...newWins])];
  localStorage.setItem('wonUIDs', JSON.stringify(wonUIDs));

  const resultContainer = document.getElementById('result');
  resultContainer.innerHTML = '';

  winList.forEach((w, i) => {
    const uid = w[2] || '';
    const name = w[4] || '无';
    const comment = w[7] || '';

    const proxy = "https://images.weserv.nl/?url=";
    const originalAvatar = w[14] || "";
    const avatar = originalAvatar ? proxy + encodeURIComponent(originalAvatar) : "https://picsum.photos/50/50";

    const card = document.createElement('div');
    card.className = 'winner-card';

    const img = document.createElement('img');
    img.className = 'winner-avatar';
    img.src = avatar;
    img.onerror = function () {
      this.src = "https://picsum.photos/50/50";
    };

    const infoWrap = document.createElement('div');
    infoWrap.className = 'winner-info-wrap';

    infoWrap.innerHTML = `
      <h4>🎊 第${i+1}名</h4>
      <div class="winner-info">UID：${uid}</div>
      <div class="winner-info">${name}</div>
      <div class="winner-info">${comment}</div>
    `;

    card.appendChild(img);
    card.appendChild(infoWrap);
    resultContainer.appendChild(card);
  });

  document.getElementById('info').innerText =
    `总评论：${rows.length}｜有效：${pool.length}｜中奖：${num}｜累计已抽：${wonUIDs.length}`;
};

document.getElementById('export').onclick = () => {
  if (!winList.length) {
    alert('请先抽奖');
    return;
  }
  const ws = XLSX.utils.aoa_to_sheet([head, ...winList]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '中奖名单');
  XLSX.writeFile(wb, '老孫抽奖站_中奖名单.xlsx');
};

document.getElementById('clearRecord').onclick = () => {
  if (confirm('确定清空所有已中奖记录？')) {
    wonUIDs = [];
    localStorage.removeItem('wonUIDs');
    document.getElementById('info').innerText =
      `总评论：${rows.length}｜有效：0｜中奖：0｜累计已抽：0`;
    alert('已清空所有中奖记录');
  }
};
</script>
</body>
</html>
